# ═══════════════════════════════════════════
# SAT Bus Booking - Nginx Config for FastPanel
# PHP 8.3 + SPA Routing
# ═══════════════════════════════════════════

server {
    listen 80;
    server_name _;  # Change to your domain
    root /var/www/html;  # Change to your FastPanel public_html path
    index index.html index.php;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # PHP handling (for install.php)
    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;  # PHP 8.3 FPM
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # API endpoint for install.php
    location /install.php {
        try_files $uri $uri/ =404;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # SPA Routing - Serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Deny access to sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* \.(log|git|env|lock)$ {
        deny all;
    }
}