    <!-- Hide Kimi Agent Widget -->

      .kimi-agent-widget,
      .kimi-agent-button,
      .kimi-agent-launcher,
      .kimi-chat-widget,

      .kimi-chat-launcher,

      iframe[src*="kimi"] {
        display: none !important;
        visibility: hidden !important;
        opacity: 0 !important;
        pointer-events: none !important;
        width: 0 !important;
        height: 0 !important;
        position: absolute !important;
        z-index: -9999 !important;
        max-width: 0 !important;
        max-height: 0 !important;
        min-width: 0 !important;
        min-height: 0 !important;
        overflow: hidden !important;
        transform: scale(0) !important;
      }
    </style>
    <script>
      (function() {
        'use strict';
        function killKimi() {
          // Remove by selectors
          var sels = ['.kimi-agent-widget','.kimi-agent-button','.kimi-agent-launcher',
            '.kimi-chat-widget','.kimi-chat-button','.kimi-chat-launcher',
            'a[href*="kimi.com/agent"]','iframe[src*="kimi"]'];
          sels.forEach(function(sel) {
            try {
              document.querySelectorAll(sel).forEach(function(el) {
                el.style.cssText = 'display:none!important;visibility:hidden!important;opacity:0!important;';
                if(el.parentNode) el.parentNode.removeChild(el);
              });
            } catch(e) {}
          });
          // Remove by class/content match
          try {
            document.querySelectorAll('a,button,div,iframe').forEach(function(el) {
              var cls = (el.className || '').toString().toLowerCase();
              var href = (el.getAttribute('href') || '').toLowerCase();
              if(cls.indexOf('kimi') !== -1 || href.indexOf('kimi.com/agent') !== -1) {
                el.style.cssText = 'display:none!important;visibility:hidden!important;';
                if(el.parentNode) el.parentNode.removeChild(el);
              }
            });
          } catch(e) {}
        }
        // Run immediately and keep running
        killKimi();
        setInterval(killKimi, 500);
        if(document.body) {
          var obs = new MutationObserver(killKimi);
          obs.observe(document.body, { childList: true, subtree: true });
        } else {
          document.addEventListener('DOMContentLoaded', function() {
            killKimi();
            var obs = new MutationObserver(killKimi);
            obs.observe(document.body, { childList: true, subtree: true });
          });
        }
      })();
    </script>
